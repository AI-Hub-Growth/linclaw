name: Build & Release

# 触发条件：
#   - 推送版本标签 (v*.*.*)  → 构建全平台 + 创建 GitHub Release
#   - 手动触发              → 构建全平台（可选是否发布为草稿）
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      draft:
        description: '发布为草稿 Release'
        type: boolean
        default: true

# 创建 GitHub Release 需要写权限
permissions:
  contents: write

# 同一 ref 有新触发时取消旧任务，节省 CI 用量
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MACOSX_DEPLOYMENT_TARGET: '14.0'  # 支持 macOS 14+ (M1/M2 及更新机型)
  NODE_VERSION: '22'

# ─────────────────────────────────────────────────────────────────────────────
# 架构说明：
#   - Web 版：Go 后端 + 静态前端，npm run release 产出 tar.gz/zip + SHA256SUMS
#   - 桌面客户端：Electron + Go 后端，electron-builder 产出 dmg/exe/AppImage
#   - 每个平台需在原生 runner 上构建
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  # ─── Web 版（Go 后端 + 静态前端）──────────────────────────────────────────
  build-web:
    name: Web 版
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - uses: actions/setup-go@v5
        with:
          go-version-file: src-go/go.mod
          cache-dependency-path: src-go/go.sum

      - name: 安装 zip（Windows 目标打包需要）
        run: sudo apt-get update && sudo apt-get install -y zip

      - name: 安装依赖
        run: npm ci

      - name: 构建 Web 版
        env:
          LINCLAW_RELEASE_DIR: ${{ runner.temp }}/web-release
        run: npm run release

      - uses: actions/upload-artifact@v4
        with:
          name: web-release
          path: ${{ runner.temp }}/web-release/
          if-no-files-found: error

  # ─── macOS ARM64（Apple Silicon）─────────────────────────────────────────
  build-mac-arm64:
    name: macOS ARM64
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - uses: actions/setup-go@v5
        with:
          go-version-file: src-go/go.mod
          cache-dependency-path: src-go/go.sum

      - name: 安装依赖
        run: npm ci

      # 需要在仓库 Settings → Secrets 中配置以下密钥以启用签名/公证：
      #   APPLE_CERT_P12_BASE64  – base64 编码的 Developer ID .p12 证书
      #   APPLE_CERT_PASSWORD    – .p12 密码
      #   APPLE_ID               – 用于公证的 Apple ID 邮箱
      #   APPLE_APP_PASSWORD     – 该 Apple ID 的专用密码
      #   APPLE_TEAM_ID          – Apple 开发者团队 ID
      - name: 构建 Electron 应用（macOS ARM64）
        env:
          CSC_LINK: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run electron:build && npx electron-builder --mac --arm64

      - uses: actions/upload-artifact@v4
        with:
          name: mac-arm64
          path: release/electron/*.dmg
          if-no-files-found: error

  # ─── macOS x64（Intel）───────────────────────────────────────────────────
  build-mac-x64:
    name: macOS x64 (Intel)
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - uses: actions/setup-go@v5
        with:
          go-version-file: src-go/go.mod
          cache-dependency-path: src-go/go.sum

      - name: 安装依赖
        run: npm ci

      - name: 构建 Electron 应用（macOS x64）
        env:
          CSC_LINK: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run electron:build && npx electron-builder --mac --x64

      - uses: actions/upload-artifact@v4
        with:
          name: mac-x64
          path: release/electron/*.dmg
          if-no-files-found: error

  # ─── Windows x64 ─────────────────────────────────────────────────────────
  build-win-x64:
    name: Windows x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - uses: actions/setup-go@v5
        with:
          go-version-file: src-go/go.mod
          cache-dependency-path: src-go/go.sum

      - name: 安装依赖
        run: npm ci

      - name: 构建 Electron 应用（Windows x64）
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run electron:build && npx electron-builder --win

      - uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: release/electron/*.exe
          if-no-files-found: error

  # ─── Linux x64 ───────────────────────────────────────────────────────────
  build-linux-x64:
    name: Linux x64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - uses: actions/setup-go@v5
        with:
          go-version-file: src-go/go.mod
          cache-dependency-path: src-go/go.sum

      - name: 安装依赖
        run: npm ci

      - name: 构建 Electron 应用（Linux x64）
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run electron:build && npx electron-builder --linux

      - uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: |
            release/electron/*.AppImage
            release/electron/*.tar.gz
          if-no-files-found: error

  # ─── 发布 GitHub Release ──────────────────────────────────────────────────
  release:
    name: 发布 Release
    needs: [build-web, build-mac-arm64, build-mac-x64, build-win-x64, build-linux-x64]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 列出待发布文件
        run: find artifacts -type f | sort

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: ${{ github.event_name == 'workflow_dispatch' && inputs.draft }}
          generate_release_notes: true
          files: |
            artifacts/web-release/*
            artifacts/mac-arm64/*
            artifacts/mac-x64/*
            artifacts/windows-x64/*
            artifacts/linux-x64/*
