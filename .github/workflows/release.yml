name: Release

# 触发条件：
#   - 推送版本标签 (v*) → 构建 Web + Electron 全平台 + 创建 GitHub Release
#   - 手动触发 → 同上，可选发布为草稿
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: 发布标签，例如 v0.8.0
        required: true
        type: string
      targets:
        description: 可选，Web 发布目标，留空表示默认全部
        required: false
        type: string
        default: ""
      prerelease:
        description: 是否标记为预发布
        required: false
        type: boolean
        default: false
      draft:
        description: 是否发布为草稿（仅手动触发时生效）
        required: false
        type: boolean
        default: true

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag_name || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  NODE_VERSION: "22"
  MACOSX_DEPLOYMENT_TARGET: "14.0"

jobs:
  # ─── Web 版（Go 跨平台 tar.gz/zip）───────────────────────────────────────
  build-web:
    name: Web Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: src-go/go.mod
          cache-dependency-path: src-go/go.sum

      - name: Ensure archive tools are available
        run: |
          sudo apt-get update
          sudo apt-get install -y zip

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG_NAME="${{ github.event.inputs.tag_name }}"
            TARGETS_INPUT="${{ github.event.inputs.targets }}"
          else
            TAG_NAME="${{ github.ref_name }}"
            TARGETS_INPUT=""
          fi

          VERSION="${TAG_NAME#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$PKG_VERSION" != "$VERSION" ]; then
            echo "package.json version ($PKG_VERSION) does not match tag ($VERSION)" >&2
            exit 1
          fi

          RELEASE_DIR="${RUNNER_TEMP}/linclaw-release/v${VERSION}"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "release_dir=$RELEASE_DIR" >> "$GITHUB_OUTPUT"
          {
            echo "targets_input<<EOF"
            echo "$TARGETS_INPUT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm ci

      - name: Build release assets
        shell: bash
        env:
          LINCLAW_RELEASE_DIR: ${{ steps.meta.outputs.release_dir }}
          TARGETS_INPUT: ${{ steps.meta.outputs.targets_input }}
        run: |
          if [ -n "$TARGETS_INPUT" ]; then
            npm run release -- $TARGETS_INPUT
          else
            npm run release
          fi

      - name: Upload web-release artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-release
          path: |
            ${{ steps.meta.outputs.release_dir }}/*.tar.gz
            ${{ steps.meta.outputs.release_dir }}/*.zip
            ${{ steps.meta.outputs.release_dir }}/SHA256SUMS
          if-no-files-found: error
          retention-days: 14

  # ─── macOS ARM64（Apple Silicon）─────────────────────────────────────────
  build-mac-arm64:
    name: macOS ARM64
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Electron (macOS ARM64)
        run: npm run electron:build && npx electron-builder --mac --arm64

      - uses: actions/upload-artifact@v4
        with:
          name: mac-arm64
          path: |
            release/electron/*.dmg
            release/electron/*.zip
          if-no-files-found: error

  # ─── macOS x64（Intel）───────────────────────────────────────────────────
  build-mac-x64:
    name: macOS x64 (Intel)
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Electron (macOS x64)
        run: npm run electron:build && npx electron-builder --mac --x64

      - uses: actions/upload-artifact@v4
        with:
          name: mac-x64
          path: |
            release/electron/*.dmg
            release/electron/*.zip
          if-no-files-found: error

  # ─── Windows x64 ─────────────────────────────────────────────────────────
  build-win-x64:
    name: Windows x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Electron (Windows x64)
        run: npm run electron:build && npx electron-builder --win

      - uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: |
            release/electron/*.exe
            release/electron/*.zip
          if-no-files-found: error

  # ─── Linux x64 ───────────────────────────────────────────────────────────
  build-linux-x64:
    name: Linux x64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Electron (Linux x64)
        run: npm run electron:build && npx electron-builder --linux

      - uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: |
            release/electron/*.AppImage
            release/electron/*.tar.gz
          if-no-files-found: error

  # ─── 发布 GitHub Release ──────────────────────────────────────────────────
  release:
    name: 发布 Release
    needs: [build-web, build-mac-arm64, build-mac-x64, build-win-x64, build-linux-x64]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 列出待发布文件
        run: find artifacts -type f | sort

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag_name || github.ref_name }}
          target_commitish: ${{ github.sha }}
          draft: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.draft || false }}
          prerelease: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.prerelease || false }}
          generate_release_notes: true
          files: artifacts/**/*
